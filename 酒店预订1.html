<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
        }
        
        body {
            background-color: #f5f5f5;
            max-width: 390px;
            margin: 0 auto;
            min-height: 100vh;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            gap: 15px;
        }

        .header {
            width: 100%;
            display: flex;
            align-items: center;
            padding: 12px 2px;
            background-color: #F7F3E7;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 5px solid #C4734A;
            color: #C4734A;
            justify-content: flex-start;
            gap: 15px;
        }

        .title {
            font-size: 16px;
            font-weight: normal;
            color: #C4734A;
        }

        .search
        {
            display: flex;
            flex-direction: row;
            gap: 20px;
            align-content: center;
        }

        .search-container {
            display: flex;
            align-items: center;
            background: #D9D9D9;
            border-radius: 20px;
            padding: 8px 16px;
            width: 302px;
            height: 33px;
        }
        
        .search-icon {
            color: #666;
            font-size: 13px;
            margin-right: 8px;
        }
        
        .search-input {
            border: none;
            background: transparent;
            font-size: 12px;
            outline: none;
            color: #333;
            padding: 5px 0;
            flex: 1;
        }
        
        .search-input::placeholder {
            color: #888;
            opacity: 0.8;
        }
        
        .main
        {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .status
        {
            background-color: #F3DFD2;
            display: flex;
            flex-direction: row;
            width: 100%;
            justify-content: space-evenly;
            height: 52px;
            align-items: center;
            color: #CA8F71;
            font-size: 1.2em;
            
        }

        .price
        {
            display: flex;
            flex-direction: row;
            align-items: flex-end;
        }

        .list {
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 357px;
            margin: auto;
            background-color: #F7F3E7;
        }

        .category {
            width: 100%;
            height: 120px;
            background-color: #F3DFD2;
            border-radius: 14px;
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 8px;
            gap: 8px;
        }
        
        .text {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 10px;
            margin-left: 5px;
        }

        a
        {
            text-decoration: none;
        }
        
        .big {
            color: #000000;
            font-weight: normal;
            font-size: 20px;
            line-height: 1.2;
        }
        
        .small {
            color: #000000;
            font-size: 14px;
            line-height: 1.2;
            margin-right: 70px;
        }
        
        .safe-area {
            height: 20px;
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html"><img src="image/箭头.png" alt="" style="width: 25px;height: 25px;"></a>
        <h1 class="title">酒店</h1>
    </div>
    <div class="search">
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索酒店">
        </div>
        <p style="font-size: 1.5em;">搜索</p>
    </div>
    <div class="main">
        <div class="status">
            <p>推荐</p>
            <p>位置</p>
            <div class="price">
                <p>价格</p>
                <img src="imagehotel/上下箭头.png" alt="" style="width: 12px;height: 12px;">
            </div>
            <p>筛选</p>
        </div>
        <div class="list">
            <div class="category">
                <img src="imagehotel/IMG_5318 1.png" alt="jiudian" style="width: 100px;height: 100px;">
                <div class="text">
                    <div class="big">麗枫酒店</div>
                    <div class="small">“床品柔软如云朵<br>一夜无梦到天明”</div>
                </div>
            </div>
            <div class="category">
                <img src="imagehotel/IMG_5317 1.png" alt="jiudian" style="width: 100px;height: 100px;">
                <div class="text">
                    <div class="big">如家酒店</div>
                    <div class="small">“隔音极佳”<br>繁华中独享一方静谧”</div>
                </div>
            </div>
            <div class="category">
                <img src="imagehotel/IMG_5316 1.png" alt="jiudian" style="width: 100px;height: 100px;">
                <div class="text">
                    <div class="big">桔子水晶酒店</div>
                    <div class="small">“服务细致却不打扰<br>倍感自在放松”</div>
                </div>
            </div>
            <div class="category">
                <img src="imagehotel/IMG_5314 1.png" alt="jiudian" style="width: 100px;height: 100px;">
                <div class="text">
                    <div class="big">亚朵酒店</div>
                    <div class="small">“推窗即景，清风拂面<br>惬意悠然而生”</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
