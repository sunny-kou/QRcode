<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
        }
        
        body {
            background-color: #f5f5f5;
            max-width: 390px;
            margin: 0 auto;
            min-height: 100vh;
            font-size: 13px;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 12px 2px;
            background-color: #F7F3E7;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 5px solid #C4734A;
            color: #C4734A;
            justify-content: flex-start;
            gap: 15px;
        }

        .title {
            font-size: 16px;
            font-weight: normal;
            color: #C4734A;
        }

        .ticket-list {
            padding: 8px;
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-content: flex-start;
            width: 357px;
            margin: auto;
            background-color: #F7F3E7;
            gap: 10px;
        }

        .category {
            width: 320px;
            height: 198px;
            background-color: #F3DFD2;
            border-radius: 14px;
            display: flex;
            flex-direction: row;
            align-items: center;
            /* overflow: hidden; */
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: relative;
        }

        .middletext {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #333;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            margin: 0px 0px 10px 10px;
        }

        .description
        {
            background-color:#F3DFD2 ;
            border-radius: 14px;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="非遗文化.html"><img src="image/箭头.png" alt="" style="width: 25px;height: 25px;"></a>
        <h1 class="title">北京·景泰蓝</h1>
    </div>
    <div class="ticket-list">
         <div class="category">
            <img src="imagecluture/非遗文化/景泰蓝/IMG_5284 1.png" alt="jiudian" style="width: 320px;height:198px;object-fit: cover;">
            <div class="ticket-title"></div>
        </div>
        <div class="middletext">
            <img src="image/三角形.png" alt="triangle" style="width: 8px;height: 9px;">
            简介
        </div>
        <p class="description">
            北京景泰蓝，正名“铜胎掐丝珐琅”，是驰名中外的“燕京八绝”之一，2006年被列入首批国家级非物质文化遗产。<br>
            它集冶金、绘画与雕刻艺术于一体。匠人先用细扁铜丝在铜胎上掐出精美图案，再填入五彩斑斓的珐琅釉料，经反复焙烧、打磨、镀金而成。其成品色泽晶莹润丽，富丽华贵，具有鲜明的民族风格。<br>
            景泰蓝不仅是中国传统工艺的瑰宝，更是古代丝绸之路东西方文化交流的结晶，承载着深厚的宫廷文化底蕴与精湛的手工技艺。
        </p>
        <div class="middletext">
            <img src="image/三角形.png" alt="triangle" style="width: 8px;height: 9px;">
            特色活动
        </div>
        <img src="imagecluture/非遗文化/景泰蓝/IMG_5287 1.png" alt="">
    </div>
    
</body>
</html>
